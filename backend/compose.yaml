name: todo-app

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # Added ../ to go up one level
    depends_on:
      - backend
      - frontend

  frontend:
    image: node:22-alpine
    working_dir: /home/node/app
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
    volumes:
      - ../frontend:/home/node/app
    ports:
      - "3000:5173" # Maps your browser (3000) to Vite (5173)
    # Added -- --host 0.0.0.0 to expose Vite to the network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  backend:
    image: todo-app-backend
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
    expose:
      - "3001"
    ports:
      - "8001:3001"
    environment:
      - DEBUG=true
      - PYTHONPATH=/usr/src/app
    env_file:
      - .env
    command: uvicorn src.server:app --host 0.0.0.0 --port 3001 --reload
